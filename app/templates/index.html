<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical Diagnosis Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 15px 30px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.1rem; cursor: pointer; border-radius: 10px; transition: all 0.3s; }
        .tab-btn.active { background: white; color: #667eea; }
        .tab-btn:hover { background: rgba(255,255,255,0.3); }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        input[type="file"] { padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .btn { padding: 15px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; transition: transform 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #imagePreview { max-width: 300px; margin: 20px auto; display: none; border-radius: 10px; }
        .result { margin-top: 20px; padding: 20px; border-radius: 10px; }
        .result.success { background: #d4edda; border: 1px solid #c3e6cb; }
        .result.error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .prediction { font-size: 1.5rem; font-weight: bold; color: #667eea; margin: 10px 0; }
        .confidence { color: #666; }
        .report { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px; white-space: pre-wrap; line-height: 1.6; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Medical Diagnosis Assistant</h1>
            <p>Chest X-Ray Analysis & Heart Disease Risk Prediction</p>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('image')">Chest X-Ray Analysis</button>
            <button class="tab-btn" onclick="switchTab('tabular')">Heart Disease Risk</button>
            <button class="tab-btn" onclick="switchTab('complete')">Complete Analysis</button>
        </div>
        
        <div class="card">
            <div id="imageTab" class="tab-content active">
                <h2>Upload Chest X-Ray Image</h2>
                <form id="imageForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <input type="file" id="imageFile" accept="image/*" required>
                    </div>
                    <img id="imagePreview" alt="Preview">
                    <button type="submit" class="btn">Analyze Image</button>
                </form>
                <div id="imageResult"></div>
            </div>
            
            <div id="tabularTab" class="tab-content">
                <h2>Enter Patient Data (13 fields)</h2>
                <form id="tabularForm">
                    <div class="grid">
                        <div class="form-group">
                            <label>Age (years)</label>
                            <input type="number" name="age" min="1" max="120" required>
                        </div>
                        <div class="form-group">
                            <label>Sex (0=Female, 1=Male)</label>
                            <input type="number" name="sex" min="0" max="1" required>
                        </div>
                        <div class="form-group">
                            <label>Chest Pain Type (0-3)</label>
                            <input type="number" name="cp" min="0" max="3" required>
                        </div>
                        <div class="form-group">
                            <label>Resting BP (mmHg)</label>
                            <input type="number" name="trestbps" min="50" max="250" required>
                        </div>
                        <div class="form-group">
                            <label>Cholesterol (mg/dl)</label>
                            <input type="number" name="chol" min="100" max="600" required>
                        </div>
                        <div class="form-group">
                            <label>Fasting Blood Sugar >120 (0/1)</label>
                            <input type="number" name="fbs" min="0" max="1" required>
                        </div>
                        <div class="form-group">
                            <label>Resting ECG (0-2)</label>
                            <input type="number" name="restecg" min="0" max="2" required>
                        </div>
                        <div class="form-group">
                            <label>Max Heart Rate (thalach)</label>
                            <input type="number" name="thalach" min="50" max="250" required>
                        </div>
                        <div class="form-group">
                            <label>Exercise Angina (0/1)</label>
                            <input type="number" name="exang" min="0" max="1" required>
                        </div>
                        <div class="form-group">
                            <label>ST Depression (oldpeak)</label>
                            <input type="number" name="oldpeak" step="0.1" min="0" max="10" required>
                        </div>
                        <div class="form-group">
                            <label>ST Slope (0-2)</label>
                            <input type="number" name="slope" min="0" max="2" required>
                        </div>
                        <div class="form-group">
                            <label>Major Vessels (0-3)</label>
                            <input type="number" name="ca" min="0" max="3" required>
                        </div>
                        <div class="form-group">
                            <label>Thalassemia (0-2)</label>
                            <input type="number" name="thal" min="0" max="2" required>
                        </div>
                    </div>
                    <button type="submit" class="btn">Predict Risk</button>
                </form>
                <div id="tabularResult"></div>
            </div>
            
            <div id="completeTab" class="tab-content">
                <h2>Complete Medical Analysis</h2>
                <form id="completeForm">
                    <div class="form-group">
                        <label>Upload Chest X-Ray (Optional)</label>
                        <input type="file" id="completeImage" accept="image/*">
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>Age (years)</label>
                            <input type="number" name="age" min="1" max="120" required>
                        </div>
                        <div class="form-group">
                            <label>Sex (0=Female, 1=Male)</label>
                            <input type="number" name="sex" min="0" max="1" required>
                        </div>
                        <div class="form-group">
                            <label>Chest Pain Type (0-3)</label>
                            <input type="number" name="cp" min="0" max="3" required>
                        </div>
                        <div class="form-group">
                            <label>Resting BP (mmHg)</label>
                            <input type="number" name="trestbps" min="50" max="250" required>
                        </div>
                        <div class="form-group">
                            <label>Cholesterol (mg/dl)</label>
                            <input type="number" name="chol" min="100" max="600" required>
                        </div>
                        <div class="form-group">
                            <label>Fasting Blood Sugar >120 (0/1)</label>
                            <input type="number" name="fbs" min="0" max="1" required>
                        </div>
                        <div class="form-group">
                            <label>Resting ECG (0-2)</label>
                            <input type="number" name="restecg" min="0" max="2" required>
                        </div>
                        <div class="form-group">
                            <label>Max Heart Rate (thalach)</label>
                            <input type="number" name="thalach" min="50" max="250" required>
                        </div>
                        <div class="form-group">
                            <label>Exercise Angina (0/1)</label>
                            <input type="number" name="exang" min="0" max="1" required>
                        </div>
                        <div class="form-group">
                            <label>ST Depression (oldpeak)</label>
                            <input type="number" name="oldpeak" step="0.1" min="0" max="10" required>
                        </div>
                        <div class="form-group">
                            <label>ST Slope (0-2)</label>
                            <input type="number" name="slope" min="0" max="2" required>
                        </div>
                        <div class="form-group">
                            <label>Major Vessels (0-3)</label>
                            <input type="number" name="ca" min="0" max="3" required>
                        </div>
                        <div class="form-group">
                            <label>Thalassemia (0-2)</label>
                            <input type="number" name="thal" min="0" max="2" required>
                        </div>
                    </div>
                    <button type="submit" class="btn">Run Complete Analysis</button>
                </form>
                <div id="completeResult"></div>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }
        
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        document.getElementById('imageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('imageFile').files[0]);
            const resultDiv = document.getElementById('imageResult');
            resultDiv.innerHTML = '<div class="spinner"></div>';
            
            try {
                const response = await fetch('/predict/image', { method: 'POST', body: formData });
                const data = await response.json();
                resultDiv.innerHTML = `<div class="result success">
                    <div class="prediction">${data.prediction}</div>
                    <div class="confidence">Confidence: ${data.confidence}%</div>
                    <div>Normal: ${data.probabilities.NORMAL}% | Pneumonia: ${data.probabilities.PNEUMONIA}%</div>
                </div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">Error: ${error.message}</div>`;
            }
        });
        
        document.getElementById('tabularForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            Object.keys(data).forEach(key => data[key] = parseFloat(data[key]));
            
            const resultDiv = document.getElementById('tabularResult');
            resultDiv.innerHTML = '<div class="spinner"></div>';
            
            try {
                const response = await fetch('/predict/tabular', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.error) {
                    resultDiv.innerHTML = `<div class="result error">Error: ${result.error}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result success">
                        <div class="prediction">${result.prediction}</div>
                        <div class="confidence">Confidence: ${result.confidence}%</div>
                        <div>No Risk: ${result.probabilities['No Risk']}% | Risk: ${result.probabilities.Risk}%</div>
                    </div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">Error: ${error.message}</div>`;
            }
        });
        
        document.getElementById('completeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const resultDiv = document.getElementById('completeResult');
            resultDiv.innerHTML = '<div class="spinner"></div>';
            
            try {
                const formData = new FormData(e.target);
                const tabularData = {};
                for (const [key, value] of formData.entries()) {
                    if (key !== 'completeImage' && value) {
                        tabularData[key] = parseFloat(value);
                    }
                }
                
                console.log("[DEBUG] Sending data:", tabularData);
                
                let imageData = null;
                const imageFile = document.getElementById('completeImage').files[0];
                if (imageFile) {
                    imageData = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(imageFile);
                    });
                }
                
                const response = await fetch('/predict/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_data: imageData, tabular_data: tabularData })
                });
                
                const text = await response.text();
                console.log("[DEBUG] Raw response:", text);
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    resultDiv.innerHTML = `<div class="result error">Server returned non-JSON: ${text.substring(0, 500)}</div>`;
                    return;
                }
                
                console.log("[DEBUG] Parsed response:", data);
                
                let html = '';
                if (data.image_prediction && !data.image_prediction.error) {
                    html += `<div class="result success">
                        <h3>Image Analysis</h3>
                        <div class="prediction">${data.image_prediction.prediction}</div>
                        <div class="confidence">Confidence: ${data.image_prediction.confidence}%</div>
                    </div>`;
                }
                if (data.heart_risk && !data.heart_risk.error) {
                    html += `<div class="result success">
                        <h3>Heart Disease Risk</h3>
                        <div class="prediction">${data.heart_risk.prediction}</div>
                        <div class="confidence">Confidence: ${data.heart_risk.confidence}%</div>
                    </div>`;
                }
                if (data.llm_analysis) {
                    html += `<div class="report"><h3>AI Medical Report</h3>${data.llm_analysis}</div>`;
                }
                if (data.image_prediction && data.image_prediction.error) {
                    html += `<div class="result error">Image Error: ${data.image_prediction.error}</div>`;
                }
                if (data.heart_risk && data.heart_risk.error) {
                    html += `<div class="result error">Heart Error: ${data.heart_risk.error}</div>`;
                }
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
